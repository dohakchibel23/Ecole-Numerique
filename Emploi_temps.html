<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emploi du Temps - NextMind Academy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { font-family: "Inter", sans-serif; background-color: #F4F6F9; }
    </style>
    <script>
        const API = 'http://localhost:8080/nextacademy_3';
    </script>
</head>

<body class="bg-light">
    <!--navigateur-->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="acceuil2.html">
                <img src="logo_white.png" alt="Logo" class="img-fluid rounded" style="width: 4rem; height: 3rem; object-fit: cover;">
                NextMind Academy
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="acceuil2.html">
                            <i class="bi bi-house"> Acceuil</i>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="Emploi_temps.html">
                            <i class="bi bi-clipboard-data"> Emploi du temps</i>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cours.html">
                            <i class="bi bi-book"> Cours</i>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="notes_absences2.html">
                            <i class="bi bi-clipboard-data"> Notes & Absences</i>
                        </a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle"> <span id="nav-username">username</span></i>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li>
                                <a class="dropdown-item" href="profil2.html">
                                    <i class="bi bi-person"></i> Profil
                                </a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <a class="dropdown-item" href="index2.html" onclick="localStorage.clear();">
                                    <i class="bi bi-box-arrow-right"></i> Déconnexion
                                </a>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="text-center mb-4">Mon Emploi du Temps (<span class="text-primary" id="txt-classe">...</span>)</h2>

        <div class="card shadow">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered text-center align-middle">
                        <thead class="table-primary">
                            <tr>
                                <th>Horaires</th>
                                <th>Lundi</th>
                                <th>Mardi</th>
                                <th>Mercredi</th>
                                <th>Jeudi</th>
                                <th>Vendredi</th>
                            </tr>
                        </thead>
                        <tbody id="planning-tbody">
                            <tr>
                                <td colspan="6" class="text-muted p-4">Chargement...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-primary text-white text-center mt-5 p-3">
        2026 NextMind Academy - Plateforme d'École Numérique
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Vérification de la session
            const etudiant = JSON.parse(localStorage.getItem('etudiant') || 'null');
            if (!etudiant) {
                window.location.href = 'index2.html';
                return;
            }

            // Mettre le nom d'utilisateur dans la navbar
            document.getElementById('nav-username').textContent = etudiant.username || 'Étudiant';

            // Récupérer les données dynamiques depuis l'API
            fetch(`${API}/emploi2.php?etudiant_id=${etudiant.id}`)
                .then(res => res.json())
                .then(data => {
                    // Mettre à jour le titre avec la classe
                    document.getElementById('txt-classe').textContent = data.classe || 'Non assignée';

                    const tbody = document.getElementById('planning-tbody');
                    tbody.innerHTML = ''; // Vider le tableau

                    // Définition des tranches horaires
                    const tranches = [
                        { label: "08h00 - 10h00", start: "08" },
                        { label: "10h00 - 12h00", start: "10" },
                        { label: "14h00 - 16h00", start: "14" },
                        { label: "16h00 - 18h00", start: "16" }
                    ];

                    const jours = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi"];

                    // Création dynamique des lignes du tableau
                    tranches.forEach(tranche => {
                        let tr = `<tr><td><strong>${tranche.label}</strong></td>`;
                        
                        jours.forEach(jour => {
                            // Chercher le cours correspondant dans la base de données
                            const seance = data.seances ? data.seances.find(s => 
                                s.jour.toLowerCase() === jour.toLowerCase() && 
                                s.heure_debut.startsWith(tranche.start)
                            ) : null;

                            if (seance) {
                                let colorClass = 'table-light';
                                let mat = seance.matiere.toLowerCase();
                                if (mat.includes('java') || mat.includes('web') || mat.includes('pilotage')) colorClass = 'table-primary';
                                else if (mat.includes('données') || mat.includes('uml')) colorClass = 'table-success';
                                else if (mat.includes('réseaux') || mat.includes('mobile')) colorClass = 'table-info';
                                else colorClass = 'table-warning';

                                // Ajouter la salle s'il y en a une
                                let salleHtml = seance.salle ? `<br><small class="text-secondary"><i class="bi bi-geo-alt"></i> ${seance.salle}</small>` : '';
                                
                                tr += `<td class="${colorClass}"><strong>${seance.matiere}</strong>${salleHtml}</td>`;
                            } else {
                                tr += `<td>-</td>`;
                            }
                        });

                        tr += `</tr>`;
                        tbody.innerHTML += tr;
                    });
                })
                .catch(err => {
                    console.error("Erreur de synchronisation planning:", err);
                    document.getElementById('planning-tbody').innerHTML = 
                        `<tr><td colspan="6" class="text-danger p-4">Impossible de contacter la base de données.</td></tr>`;
                });
        });
    </script>
</body>
</html>
